<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>login page</h1>
    <hr>
    <form>
        <input type="text" id="username"><br>
        <input type="password" id="password"><br>
        <button type="button" onclick="login()">로그인</button>
    </form>

    <script>
      async function login() {
        let userDto = {
          username: document.querySelector("#username").value,
          password: document.querySelector("#password").value
        }

        let jsonData = JSON.stringify(userDto);
        let r1 = await fetch("http://localhost:8081/api/login", {
          method: "post",
          body: jsonData,
          headers: {
            "Content-Type": "application/json; charset=utf-8"
          }
        })

        console.log("Authorization", r1.headers.get("Authorization")); // Bearer token ( 프론트에서는 해당 인증 토큰 받아서 브라우저 스토리지에 저장해서 API 요청시마다 헤더에 실어보내면 될 것 같다. ) | 참고. 서버 cors 설정에서 config.setExposedHeaders(List.of("Authorization")); 를 해주어야, 클라이언트에서 스크립트에서 접근할 수 있다. )

        let token = r1.headers.get("Authorization");
        localStorage.setItem("token", token);
        sessionStorage.setItem("token", token);

        let r2 = await r1.json();
        console.log(r2);
      }
    </script>
</body>
</html>
